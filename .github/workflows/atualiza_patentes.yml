name: Atualiza CSVs de Patentes

on:
  push:
    branches:
      - main
  workflow_dispatch: # permite rodar manualmente

jobs:
  update-csvs:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar o repositório
      - name: Checkout do repositório
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # token padrão do GitHub Actions

      # 2. Configurar Git
      - name: Configura Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # 3. Gerar/atualizar CSVs
      - name: Atualiza CSVs
        run: |
          # Exemplo: seu script que gera CSVs
          python dadosabertos.py

      # 4. Commitar alterações, só se houver mudanças
      - name: Commitar alterações
        run: |
          git add .
          git diff --cached --quiet || git commit -m "Atualiza CSVs de patentes"

      # 5. Push de volta para main
      - name: Push para o repositório
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
